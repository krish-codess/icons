<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iOS App Onboarding Icons</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #09090f; color: #fff; padding: 60px 40px; min-height: 100vh; }
.page-title { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; background: linear-gradient(135deg,#fff 0%,#555 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.page-sub { color: #444; font-size: 15px; margin-bottom: 70px; font-weight: 300; letter-spacing: 0.3px; }
.section { margin-bottom: 80px; }
.section-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: #333; margin-bottom: 6px; }
.section-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 24px; color: #fff; }
.icon-row { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-start; }
.icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.icon-wrap span { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; color: #555; text-transform: uppercase; }
.ico { width: 44px; height: 44px; display: block; }

/* ── DOWNLOAD BUTTON & PANEL ── */
.dl-wrap { position: relative; display: flex; justify-content: center; }
.dl-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
  font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s ease;
  font-family: 'DM Sans', sans-serif;
}
.dl-btn:hover, .dl-btn.active { background: rgba(79,141,253,0.22); border-color: rgba(79,141,253,0.5); color: #8bbfff; transform: translateY(-1px); }
.dl-btn.done { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.45); color: #4ade80; pointer-events: none; }
.neo-bg .dl-btn, .clay-bg .dl-btn { border-color: rgba(0,0,0,0.13); background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.38); }
.neo-bg .dl-btn:hover, .neo-bg .dl-btn.active, .clay-bg .dl-btn:hover, .clay-bg .dl-btn.active { background: rgba(79,141,253,0.15); border-color: rgba(79,141,253,0.4); color: #3b7dd8; }

.dl-panel {
  position: absolute;
  bottom: calc(100% + 10px);
  background: #15151e;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 12px 30px rgba(0,0,0,0.6);
  z-index: 100;
  min-width: 145px;
}
.dl-panel.show { opacity: 1; visibility: visible; transform: translateY(0); }
.dl-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.dl-row label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
.dl-row select { 
  background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.15); 
  border-radius: 6px; padding: 4px 6px; font-size: 11px; outline: none; 
  font-family: 'DM Sans'; cursor: pointer; flex-grow: 1;
}
.dl-action { 
  background: #4f8dfd; color: #fff; border: none; border-radius: 6px; 
  padding: 7px; font-size: 11px; font-weight: 600; cursor: pointer; 
  margin-top: 4px; transition: background 0.2s; 
}
.dl-action:hover { background: #3b7dd8; }

/* Light Theme Adjustments for Panel */
.neo-bg .dl-panel, .clay-bg .dl-panel { background: #fff; border-color: rgba(0,0,0,0.08); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
.neo-bg .dl-row label, .clay-bg .dl-row label { color: #888; }
.neo-bg .dl-row select, .clay-bg .dl-row select { background: #f5f6f8; color: #333; border-color: rgba(0,0,0,0.08); }

/* ── GLASS ── */
.glass-bg { padding: 32px; border-radius: 28px; background: linear-gradient(135deg,#0c0c18,#0a1020); position: relative; overflow: hidden; }
.glass-bg::before { content:''; position:absolute; width:250px; height:250px; background:radial-gradient(circle,rgba(100,140,255,0.13) 0%,transparent 70%); top:-60px; left:-60px; pointer-events:none; }
.glass-bg::after  { content:''; position:absolute; width:200px; height:200px; background:radial-gradient(circle,rgba(180,100,255,0.09) 0%,transparent 70%); bottom:-40px; right:-40px; pointer-events:none; }
.glass-card { width:84px; height:96px; border-radius:22px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; transition:all 0.3s ease; background:rgba(255,255,255,0.055); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.12); box-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.13); }
.glass-card::before { content:''; position:absolute; top:0; left:0; right:0; height:45%; background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 100%); border-radius:22px 22px 0 0; pointer-events:none; }
.glass-card:hover { transform:translateY(-7px); box-shadow:0 24px 48px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.22); border-color:rgba(255,255,255,0.22); background:rgba(255,255,255,0.09); }

/* ── NEO ── */
.neo-bg { padding:32px; border-radius:28px; background:#dde4ed; }
.neo-card { width:84px; height:96px; border-radius:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s ease; background:#dde4ed; box-shadow:7px 7px 16px #b8bec8,-7px -7px 16px #ffffff; }
.neo-card:hover { box-shadow:4px 4px 10px #b8bec8,-4px -4px 10px #ffffff; transform:scale(0.97); }
.neo-card:active { box-shadow:inset 5px 5px 12px #b8bec8,inset -5px -5px 12px #ffffff; transform:scale(0.95); }
.neo-wrap span { color:#8fa0b0 !important; }

/* ── HOLO ── */
.holo-bg { padding:32px; border-radius:28px; background:#060610; position:relative; overflow:hidden; }
.holo-bg::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px); pointer-events:none; }
.holo-card { width:84px; height:96px; border-radius:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.4s ease; position:relative; overflow:hidden; background:rgba(255,255,255,0.03); }
.holo-card::before { content:''; position:absolute; inset:0; border-radius:22px; padding:1px; background:linear-gradient(135deg,#ff6ec4,#7873f5,#4adede,#ffe45e,#ff6ec4); background-size:400% 400%; animation:holoShift 3s ease infinite; -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; z-index:0; }
.holo-card::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,110,196,0.06),rgba(120,115,245,0.06),rgba(74,222,222,0.06)); background-size:400% 400%; animation:holoShift 3s ease infinite; border-radius:22px; z-index:0; }
@keyframes holoShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.holo-card>.ico { position:relative; z-index:1; }
.holo-card:hover { transform:translateY(-7px); box-shadow:0 20px 40px rgba(120,115,245,0.3); }

/* ── AURORA ── */
.aurora-bg { padding:32px; border-radius:28px; background:#06060e; position:relative; overflow:hidden; }
.aurora-bg::before { content:''; position:absolute; width:300px; height:300px; background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%); top:-80px; left:-80px; pointer-events:none; }
.aurora-card { width:84px; height:96px; border-radius:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1); position:relative; overflow:hidden; }
.aurora-card.blue   { background:linear-gradient(145deg,#1a3a6b,#2563eb,#60a5fa); box-shadow:0 8px 25px rgba(37,99,235,0.45),inset 0 1px 0 rgba(255,255,255,0.22); }
.aurora-card.teal   { background:linear-gradient(145deg,#0a3d37,#0d9488,#5eead4); box-shadow:0 8px 25px rgba(13,148,136,0.45),inset 0 1px 0 rgba(255,255,255,0.22); }
.aurora-card.purple { background:linear-gradient(145deg,#2d1060,#7c3aed,#c084fc); box-shadow:0 8px 25px rgba(124,58,237,0.45),inset 0 1px 0 rgba(255,255,255,0.22); }
.aurora-card.green  { background:linear-gradient(145deg,#04391a,#16a34a,#4ade80); box-shadow:0 8px 25px rgba(22,163,74,0.45),inset 0 1px 0 rgba(255,255,255,0.22); }
.aurora-card.orange { background:linear-gradient(145deg,#5a2800,#d97706,#fbbf24); box-shadow:0 8px 25px rgba(217,119,6,0.45),inset 0 1px 0 rgba(255,255,255,0.22); }
.aurora-card::before { content:''; position:absolute; top:-35%; left:-35%; width:75%; height:75%; background:radial-gradient(circle,rgba(255,255,255,0.28) 0%,transparent 70%); border-radius:50%; pointer-events:none; transition:all 0.4s ease; }
.aurora-card:hover::before { transform:translate(25%,25%) scale(1.3); }
.aurora-card:hover { transform:translateY(-8px); }

/* ── CLAY ── */
.clay-bg { padding:32px; border-radius:28px; background:linear-gradient(135deg,#f5f0ff,#eef4ff); }
.clay-card { width:84px; height:96px; border-radius:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); position:relative; }
.clay-card.blue   { background:linear-gradient(145deg,#7fbfff,#4F8DFD); box-shadow:0 10px 0 #2250cc,0 14px 22px rgba(79,141,253,0.32),inset 0 -3px 0 rgba(0,0,0,0.1),inset 0 3px 8px rgba(255,255,255,0.45); }
.clay-card.teal   { background:linear-gradient(145deg,#40e0ce,#14B8A6); box-shadow:0 10px 0 #0a7a6e,0 14px 22px rgba(20,184,166,0.32),inset 0 -3px 0 rgba(0,0,0,0.1),inset 0 3px 8px rgba(255,255,255,0.45); }
.clay-card.purple { background:linear-gradient(145deg,#cc8eff,#A855F7); box-shadow:0 10px 0 #6b1aad,0 14px 22px rgba(168,85,247,0.32),inset 0 -3px 0 rgba(0,0,0,0.1),inset 0 3px 8px rgba(255,255,255,0.45); }
.clay-card.green  { background:linear-gradient(145deg,#5de88e,#22C55E); box-shadow:0 10px 0 #0f6e34,0 14px 22px rgba(34,197,94,0.32),inset 0 -3px 0 rgba(0,0,0,0.1),inset 0 3px 8px rgba(255,255,255,0.45); }
.clay-card.orange { background:linear-gradient(145deg,#ffd55a,#F59E0B); box-shadow:0 10px 0 #b36a00,0 14px 22px rgba(245,158,11,0.32),inset 0 -3px 0 rgba(0,0,0,0.1),inset 0 3px 8px rgba(255,255,255,0.45); }
.clay-card:hover  { transform:translateY(-7px); }
.clay-card:active { transform:translateY(4px); }
.clay-wrap span   { color:#a0b0c8 !important; }


/* ════════════════════════════════════════════════
   ICON HOVER ANIMATIONS (CSS)
═════════════════════════════════════════════════ */

/* 1. GROW BUSINESS */
.card-grow .grow-b1, .card-grow .grow-b2, .card-grow .grow-b3 { transform-origin: 50% 38px; }
@keyframes barGrow { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.3); } }
@keyframes arrShoot { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(3px,-3px); } }
.card-grow:hover .grow-b1 { animation: barGrow 0.8s ease infinite; }
.card-grow:hover .grow-b2 { animation: barGrow 0.8s ease infinite 0.1s; }
.card-grow:hover .grow-b3 { animation: barGrow 0.8s ease infinite 0.2s; }
.card-grow:hover .grow-arr { animation: arrShoot 0.8s ease infinite; }

/* 2. EXCLUSIVE DEALS */
@keyframes tagSwing { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-6deg); } 75% { transform: rotate(5deg); } }
@keyframes starSparkle { 0%, 100% { transform: scale(1) rotate(0deg); opacity:0.95; } 50% { transform: scale(1.4) rotate(45deg); opacity:1; } }
.card-deals:hover .deals-tag { animation: tagSwing 1s ease infinite; transform-origin: 12px 12px; }
.card-deals:hover .deals-star { animation: starSparkle 1s ease infinite; }

/* 3. LOCAL BUSINESS */
@keyframes pinBounceLocal { 0%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } 60% { transform: translateY(-2px); } }
@keyframes awningPulse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(2px); } }
.card-local:hover .local-pin { animation: pinBounceLocal 1s ease infinite; }
.card-local:hover .local-awning { animation: awningPulse 1s ease infinite; }


/* PREVIOUS ICONS */
@keyframes calBodyShake { 0%{transform:rotate(0)} 15%{transform:rotate(-3deg)} 35%{transform:rotate(3deg)} 55%{transform:rotate(-2deg)} 75%{transform:rotate(1deg)} 100%{transform:rotate(0)} }
@keyframes calRingL { 0%{transform:rotate(0) translateY(0)} 20%{transform:rotate(-12deg) translateY(-4px)} 50%{transform:rotate(6deg) translateY(-2px)} 75%{transform:rotate(-4deg) translateY(-3px)} 100%{transform:rotate(0) translateY(0)} }
@keyframes calRingR { 0%{transform:rotate(0) translateY(0)} 20%{transform:rotate(12deg) translateY(-4px)} 50%{transform:rotate(-6deg) translateY(-2px)} 75%{transform:rotate(4deg) translateY(-3px)} 100%{transform:rotate(0) translateY(0)} }
.card-calendar:hover .ico { animation:calBodyShake 0.5s ease forwards; }
.card-calendar:hover .cal-ring-l { animation:calRingL 0.5s ease forwards; transform-origin:15px 9px; }
.card-calendar:hover .cal-ring-r { animation:calRingR 0.5s ease forwards; transform-origin:29px 9px; }

@keyframes clockSpin { to { transform:rotate(360deg); } }
.card-clock:hover .clock-hand { animation:clockSpin 1.2s linear infinite; transform-origin:22px 22px; }

@keyframes globeSpin { to { transform:rotateY(360deg); } }
.card-globe:hover .ico { animation:globeSpin 1.8s linear infinite; }

@keyframes lidPop { 0%{transform:translateY(0)} 35%{transform:translateY(-8px)} 65%{transform:translateY(-6px)} 100%{transform:translateY(0)} }
.card-lunchbox:hover .lunchbox-lid { animation:lidPop 0.7s ease infinite; }

@keyframes pinBounce { 0%{transform:translateY(0) scaleY(1)} 25%{transform:translateY(-10px) scaleY(1.05)} 50%{transform:translateY(0) scaleY(0.92)} 70%{transform:translateY(-5px)} 85%{transform:translateY(0) scaleY(0.96)} 100%{transform:translateY(0) scaleY(1)} }
.card-location:hover .ico { animation:pinBounce 0.7s ease forwards; }

@keyframes searchShake { 0%{transform:rotate(0)} 15%{transform:rotate(-8deg)} 35%{transform:rotate(7deg)} 55%{transform:rotate(-5deg)} 75%{transform:rotate(3deg)} 100%{transform:rotate(0)} }
.card-search:hover .ico { animation:searchShake 0.6s ease forwards; }

@keyframes cartWobble { 0%{transform:translateX(0)} 20%{transform:translateX(4px)} 40%{transform:translateX(-3px)} 60%{transform:translateX(3px)} 80%{transform:translateX(-2px)} 100%{transform:translateX(0)} }
@keyframes wheelSpin { to { transform:rotate(360deg); } }
.card-cart:hover .ico { animation:cartWobble 0.6s ease forwards; }
.card-cart:hover .cart-wl { animation:wheelSpin 0.6s linear infinite; transform-origin:16px 34px; }
.card-cart:hover .cart-wr { animation:wheelSpin 0.6s linear infinite; transform-origin:29px 34px; }

@keyframes tickDraw { from{stroke-dashoffset:42;opacity:0.3} to{stroke-dashoffset:0;opacity:1} }
@keyframes shieldPulse { 0%,100%{opacity:0.17} 50%{opacity:0.35} }
.card-tick:hover .tick-check { animation:tickDraw 0.45s ease forwards; stroke-dasharray:42; stroke-dashoffset:42; }
.card-tick:hover .tick-shield { animation:shieldPulse 0.8s ease infinite; }

@keyframes pctWiggle { 0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.95; } 20% { transform: scale(1.15) rotate(8deg); opacity: 1; } 50% { transform: scale(0.92) rotate(-5deg); opacity: 0.8; } 80% { transform: scale(1.08) rotate(3deg); opacity: 1; } }
@keyframes ringPulse { 0%,100% { r: 13; opacity: 0.25; } 50% { r: 18; opacity: 0; } }
@keyframes ringPulse2 { 0%,100% { r: 18; opacity: 0.15; } 50% { r: 22; opacity: 0; } }
.card-offers:hover .offers-pct   { animation: pctWiggle 0.6s ease infinite; transform-origin: 22px 22px; }
.card-offers:hover .offers-ring1 { animation: ringPulse  0.7s ease infinite; }
.card-offers:hover .offers-ring2 { animation: ringPulse2 0.7s 0.15s ease infinite; }

@keyframes coinBob { 0%,100% { transform: translateY(0) rotate(0deg); } 40% { transform: translateY(-5px) rotate(4deg); } 70% { transform: translateY(-3px) rotate(-2deg); } }
@keyframes shineSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.card-money:hover .ico         { animation: coinBob 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.card-money:hover .money-shine { animation: shineSpin 1s linear infinite; transform-origin: 22px 22px; }
</style>
</head>
<body>

<h1 class="page-title">iOS App Onboarding Icons</h1>
<p class="page-sub">5 design systems · hover to animate · multiple formats and resolutions</p>

<div class="section">
  <div class="section-label">Style 01</div>
  <div class="section-title">✦ Glassmorphism</div>
  <div class="glass-bg">
    <div class="icon-row" id="row-glass"></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Style 02</div>
  <div class="section-title">◈ Neomorphism</div>
  <div class="neo-bg">
    <div class="icon-row" id="row-neo"></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Style 03</div>
  <div class="section-title">⬡ Liquid Crystal · Holographic</div>
  <div class="holo-bg">
    <div class="icon-row" id="row-holo"></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Style 04</div>
  <div class="section-title">◉ Aurora Gradient Bubble</div>
  <div class="aurora-bg">
    <div class="icon-row" id="row-aurora"></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Style 05</div>
  <div class="section-title">⬤ Clay 3D Inflated</div>
  <div class="clay-bg">
    <div class="icon-row" id="row-clay"></div>
  </div>
</div>

<script>
const ICONS = [
  // ── NEW ONBOARDING ICONS ──
  {
    name: 'Grow Business',
    cardClass: 'card-grow',
    svgInner: `
      <rect class="grow-b1" x="6" y="26" width="7" height="12" rx="2" fill="currentColor" opacity="0.3"/>
      <rect class="grow-b2" x="18" y="16" width="7" height="22" rx="2" fill="currentColor" opacity="0.6"/>
      <rect class="grow-b3" x="30" y="6" width="7" height="32" rx="2" fill="currentColor" opacity="0.9"/>
      <g class="grow-arr">
        <path d="M 6 18 L 18 8 L 25 14 L 38 2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 28 2 L 38 2 L 38 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>`,
    smil: (c) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <rect x="6" y="26" width="7" height="12" rx="2" fill="${c}" opacity="0.3">
    <animate attributeName="height" values="12;16;12" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="y" values="26;22;26" dur="0.8s" repeatCount="indefinite" />
  </rect>
  <rect x="18" y="16" width="7" height="22" rx="2" fill="${c}" opacity="0.6">
    <animate attributeName="height" values="22;26;22" dur="0.8s" begin="0.1s" repeatCount="indefinite" />
    <animate attributeName="y" values="16;12;16" dur="0.8s" begin="0.1s" repeatCount="indefinite" />
  </rect>
  <rect x="30" y="6" width="7" height="32" rx="2" fill="${c}" opacity="0.9">
    <animate attributeName="height" values="32;36;32" dur="0.8s" begin="0.2s" repeatCount="indefinite" />
    <animate attributeName="y" values="6;2;6" dur="0.8s" begin="0.2s" repeatCount="indefinite" />
  </rect>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 3,-3; 0,0" dur="0.8s" repeatCount="indefinite"/>
    <path d="M 6 18 L 18 8 L 25 14 L 38 2" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 28 2 L 38 2 L 38 12" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>`
  },
  {
    name: 'Exclusive Deals',
    cardClass: 'card-deals',
    svgInner: `
      <g class="deals-tag">
        <path d="M 20 5 L 8 5 A 3 3 0 0 0 5 8 L 5 20 L 22 37 A 4 4 0 0 0 28 37 L 37 28 A 4 4 0 0 0 37 22 L 20 5 Z" fill="currentColor" opacity="0.15"/>
        <path d="M 20 5 L 8 5 A 3 3 0 0 0 5 8 L 5 20 L 22 37 A 4 4 0 0 0 28 37 L 37 28 A 4 4 0 0 0 37 22 L 20 5 Z" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="2.5" fill="currentColor" opacity="0.8"/>
      </g>
      <g class="deals-star" transform="translate(32,9)">
        <path d="M 0 -5 L 2 0 L 7 2 L 2 4 L 0 9 L -2 4 L -7 2 L -2 0 Z" fill="currentColor" opacity="0.95"/>
      </g>`,

    <animateTransform attributeName="transform" type="rotate" values="0 22 22;8 22 22;-5 22 22;3 22 22;0 22 22" keyTimes="0;0.2;0.5;0.8;1" dur="1.4s" repeatCount="indefinite" additive="sum"/>
    <line x1="16" y1="28" x2="28" y2="16" stroke-width="3" stroke-linecap="round"/>
    <circle cx="16" cy="16" r="2.5" fill="${c}" stroke-width="0"/>
    <circle cx="28" cy="28" r="2.5" fill="${c}" stroke-width="0"/>

</svg>`
  },
  {
    name: 'Money',
    cardClass: 'card-money',
    svgInner: `
      <circle cx="22" cy="22" r="17" fill="currentColor" opacity="0.18"/>
      <circle cx="22" cy="22" r="17" fill="none" stroke="currentColor" stroke-width="2.8" opacity="0.85"/>
      <circle cx="22" cy="22" r="13" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.35"/>
      <text x="22" y="23" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="900" fill="currentColor" opacity="0.92" font-family="system-ui,sans-serif">$</text>
      <path class="money-shine" d="M10 10 Q14 7 20 8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>`,
    smil: (c) => `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 44 44" width="44" height="44">
  <defs><style>text{font-family:system-ui,sans-serif}</style></defs>
  <circle cx="22" cy="22" r="17" fill="${c}" opacity="0.18"/>
  <circle cx="22" cy="22" r="17" fill="none" stroke="${c}" stroke-width="2.8" opacity="0.85"/>
  <circle cx="22" cy="22" r="13" fill="none" stroke="${c}" stroke-width="1.2" opacity="0.35"/>
  <text x="22" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="900" fill="${c}" opacity="0.92">$
    <animate attributeName="y" values="23;20;23" dur="1.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="font-size" values="15;18;15" dur="1.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

      <mpath xlink:href="#coin-orbit"/>

const STYLES = [
  { rowId: 'row-glass', cardType: 'glass-card', colors: ['#6FAAFF','#2DD4BF','#C084FC','#FBBF24','#ff6b6b','#60dfff','#4ADE80'], filter: (c) => `drop-shadow(0 0 8px ${c}99)` },
  { rowId: 'row-neo', cardType: 'neo-card', wrapExtra: 'neo-wrap', colors: ['#4F8DFD','#14B8A6','#A855F7','#F59E0B','#ef4444','#0ea5e9','#22C55E'] },
  { rowId: 'row-holo', cardType: 'holo-card', colors: ['#a0c4ff','#7fffff','#d4b3ff','#ffd6a0','#ff9999','#80dfff','#a8ffcc'], filter: (c) => `drop-shadow(0 0 10px ${c})` },
  { rowId: 'row-aurora', cardType: 'aurora-card', colorClass: ['blue','teal','purple','orange','orange','blue','green'], colors: Array(7).fill('rgba(255,255,255,0.93)') },
  { rowId: 'row-clay', cardType: 'clay-card', wrapExtra: 'clay-wrap', colorClass: ['blue','teal','purple','orange','orange','blue','green'], colors: Array(7).fill('rgba(255,255,255,0.95)') }
];

// Utility: Trigger native download
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── BUILD AND INJECT CARDS ──
function buildCard(icon, style, idx) {
  // Safe color wrapping (supports any number of icons)
  const color = style.colors[idx % style.colors.length];
  const filterStr = style.filter ? `filter:${style.filter(color)};` : '';
  const colorClass = style.colorClass ? style.colorClass[idx % style.colorClass.length] : '';

  const wrap = document.createElement('div');
  wrap.className = 'icon-wrap' + (style.wrapExtra ? ' ' + style.wrapExtra : '');

  const card = document.createElement('div');
  card.className = [style.cardType, colorClass, icon.cardClass].filter(Boolean).join(' ');

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'ico');
  svg.setAttribute('viewBox', '0 0 44 44');
  svg.setAttribute('style', `color:${color};${filterStr}`);
  svg.innerHTML = icon.svgInner;
  card.appendChild(svg);

  const label = document.createElement('span');
  label.textContent = icon.name;

  // ── NEW: DOWNLOAD COMPONENT ──
  const dlWrap = document.createElement('div');
  dlWrap.className = 'dl-wrap';

  const btn = document.createElement('button');
  btn.className = 'dl-btn';
  btn.textContent = '↓ Download';

  const panel = document.createElement('div');
  panel.className = 'dl-panel';
  panel.innerHTML = `
    <div class="dl-row">
      <label>Format</label>
      <select class="dl-format">
        <option value="SVG">SVG (Anim)</option>
        <option value="PNG">PNG (Static)</option>
      </select>
    </div>
    <div class="dl-row">
      <label>Size</label>
      <select class="dl-size">
        <option value="64">64px</option>
        <option value="128">128px</option>
        <option value="256" selected>256px</option>
        <option value="512">512px</option>
      </select>
    </div>
    <button class="dl-action">Save Icon</button>
  `;

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.dl-panel.show').forEach(p => {
      if (p !== panel) {
        p.classList.remove('show');
        p.previousElementSibling.classList.remove('active');
      }
    });
    panel.classList.toggle('show');
    btn.classList.toggle('active');
  });

  panel.addEventListener('click', e => e.stopPropagation());

  const actionBtn = panel.querySelector('.dl-action');
  actionBtn.addEventListener('click', () => {
    const format = panel.querySelector('.dl-format').value;
    const size = parseInt(panel.querySelector('.dl-size').value, 10);
    const filename = icon.name.toLowerCase().replace(/\s+/g,'-');

    panel.classList.remove('show');
    btn.classList.remove('active');
    btn.textContent = '✓ Saved!';
    btn.classList.add('done');
    setTimeout(() => {
      btn.textContent = '↓ Download';
      btn.classList.remove('done');
    }, 1800);

    if (format === 'SVG') {
      let rawSVG = icon.smil(color);
      const sizedSVG = rawSVG.replace(/width="44"/, `width="${size}"`).replace(/height="44"/, `height="${size}"`);
      const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n' + sizedSVG], { type: 'image/svg+xml' });
      triggerDownload(blob, `${filename}-${size}x${size}.svg`);
    } else {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      const innerFilled = icon.svgInner.replace(/currentColor/g, color);
      const staticSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="${size}" height="${size}">${innerFilled}</svg>`;
      const blob = new Blob([staticSVG], { type: 'image/svg+xml;charset=utf-8' });
      
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
        canvas.toBlob(pngBlob => {
          triggerDownload(pngBlob, `${filename}-${size}x${size}.png`);
        }, 'image/png');
      };
      img.src = url;
    }
  });

  dlWrap.appendChild(btn);
  dlWrap.appendChild(panel);

  wrap.appendChild(card);
  wrap.appendChild(label);
  wrap.appendChild(dlWrap);
  return wrap;
}

// Render cards
STYLES.forEach(style => {
  const row = document.getElementById(style.rowId);
  ICONS.forEach((icon, idx) => {
    row.appendChild(buildCard(icon, style, idx));
  });
});

document.addEventListener('click', () => {
  document.querySelectorAll('.dl-panel.show').forEach(p => {
    p.classList.remove('show');
    p.previousElementSibling.classList.remove('active');
  });
});
</script>
