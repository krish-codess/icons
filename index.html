<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium iOS Onboarding Icons</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #09090f; color: #fff; padding: 60px 40px; min-height: 100vh; }
.page-title { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; background: linear-gradient(135deg,#fff 0%,#555 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.page-sub { color: #444; font-size: 15px; margin-bottom: 70px; font-weight: 300; letter-spacing: 0.3px; }
.section { margin-bottom: 80px; }
.section-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: #333; margin-bottom: 6px; }
.section-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 24px; color: #fff; }
.icon-row { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-start; }
.icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.icon-wrap span { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; color: #555; text-transform: uppercase; text-align: center; max-width: 80px; line-height: 1.2; }
.ico { width: 44px; height: 44px; display: block; }

/* ── DOWNLOAD PANEL ── */
.dl-wrap { position: relative; display: flex; justify-content: center; }
.dl-btn {
  padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
  font-size: 10px; font-weight: 600; letter-spacing: 0.4px; cursor: pointer;
  transition: all 0.2s ease; font-family: 'DM Sans', sans-serif;
}
.dl-btn:hover, .dl-btn.active { background: rgba(79,141,253,0.22); border-color: rgba(79,141,253,0.5); color: #8bbfff; transform: translateY(-1px); }
.dl-btn.done { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.45); color: #4ade80; }

.dl-panel {
  position: absolute; bottom: calc(100% + 10px); background: #15151e;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 12px;
  display: flex; flex-direction: column; gap: 10px; opacity: 0; visibility: hidden;
  transform: translateY(10px); transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 12px 30px rgba(0,0,0,0.6); z-index: 100; min-width: 145px;
}
.dl-panel.show { opacity: 1; visibility: visible; transform: translateY(0); }
.dl-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.dl-row label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: 700; }
.dl-row select { 
  background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.15); 
  border-radius: 6px; padding: 4px; font-size: 10px; cursor: pointer;
}
.dl-action { 
  background: #4f8dfd; color: #fff; border: none; border-radius: 6px; 
  padding: 7px; font-size: 11px; font-weight: 600; cursor: pointer; 
}

/* Light Theme Adjustments */
.neo-bg .dl-panel, .clay-bg .dl-panel { background: #fff; border-color: rgba(0,0,0,0.1); color: #333; }
.neo-bg .dl-row select, .clay-bg .dl-row select { background: #f0f0f0; color: #333; border-color: #ddd; }

/* ── STYLES (GLASS, NEO, HOLO, AURORA, CLAY) ── */
.glass-bg { padding: 32px; border-radius: 28px; background: linear-gradient(135deg,#0c0c18,#0a1020); position: relative; overflow: hidden; }
.glass-card { width:84px; height:96px; border-radius:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); transition: 0.3s; }
.glass-card:hover { transform:translateY(-7px); background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.3); }

.neo-bg { padding:32px; border-radius:28px; background:#dde4ed; }
.neo-card { width:84px; height:96px; border-radius:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:#dde4ed; box-shadow:7px 7px 16px #b8bec8,-7px -7px 16px #ffffff; transition: 0.2s; }
.neo-card:hover { transform:scale(0.97); box-shadow:4px 4px 10px #b8bec8,-4px -4px 10px #ffffff; }

.holo-bg { padding:32px; border-radius:28px; background:#060610; }
.holo-card { width:84px; height:96px; border-radius:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; background:rgba(255,255,255,0.03); overflow:hidden; transition: 0.4s; }
.holo-card::before { content:''; position:absolute; inset:0; padding:1px; background:linear-gradient(135deg,#ff6ec4,#7873f5,#4adede,#ff6ec4); background-size:400%; animation: holoShift 3s linear infinite; -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; }
@keyframes holoShift { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
.holo-card:hover { transform:translateY(-7px); box-shadow:0 15px 30px rgba(120,115,245,0.3); }

.aurora-bg { padding:32px; border-radius:28px; background:#06060e; }
.aurora-card { width:84px; height:96px; border-radius:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: 0.35s cubic-bezier(0.34,1.56,0.64,1); }
.aurora-card.blue { background:linear-gradient(145deg,#2563eb,#60a5fa); }
.aurora-card.teal { background:linear-gradient(145deg,#0d9488,#5eead4); }
.aurora-card.purple { background:linear-gradient(145deg,#7c3aed,#c084fc); }
.aurora-card.orange { background:linear-gradient(145deg,#d97706,#fbbf24); }
.aurora-card.green { background:linear-gradient(145deg,#16a34a,#4ade80); }
.aurora-card:hover { transform:translateY(-8px); filter: brightness(1.1); }

.clay-bg { padding:32px; border-radius:28px; background:#f0f4f8; }
.clay-card { width:84px; height:96px; border-radius:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: 0.3s; }
.clay-card.blue { background:#4F8DFD; box-shadow:0 8px 0 #2250cc, 0 12px 20px rgba(79,141,253,0.3); }
.clay-card.teal { background:#14B8A6; box-shadow:0 8px 0 #0a7a6e, 0 12px 20px rgba(20,184,166,0.3); }
.clay-card.purple { background:#A855F7; box-shadow:0 8px 0 #6b1aad, 0 12px 20px rgba(168,85,247,0.3); }
.clay-card.orange { background:#F59E0B; box-shadow:0 8px 0 #b36a00, 0 12px 20px rgba(245,158,11,0.3); }
.clay-card.green { background:#22C55E; box-shadow:0 8px 0 #0f6e34, 0 12px 20px rgba(34,197,94,0.3); }
.clay-card:hover { transform:translateY(-4px); }


/* ════════════════════════════════════════════════
   ICON HOVER ANIMATIONS (CSS)
═════════════════════════════════════════════════ */

/* 1. HOUSE */
@keyframes roofBounce { 0%,100% {transform:translateY(0)} 50% {transform:translateY(-3px)} }
@keyframes doorGlow { 0%,100% {opacity:0.4} 50% {opacity:1} }
.card-house:hover .house-roof { animation: roofBounce 0.6s ease infinite; }
.card-house:hover .house-door { animation: doorGlow 1.2s ease infinite; }

/* 2. BICYCLE */
@keyframes spinWheel { to {transform:rotate(360deg)} }
@keyframes bikeBob { 0%,100% {transform:translateY(0)} 50% {transform:translateY(-2px)} }
.card-bike:hover .bike-wheel { animation: spinWheel 0.8s linear infinite; transform-origin: center; }
.card-bike:hover .bike-w1 { transform-origin: 10px 30px; }
.card-bike:hover .bike-w2 { transform-origin: 34px 30px; }
.card-bike:hover .bike-frame { animation: bikeBob 0.4s ease-in-out infinite; }

/* 3. HEART */
@keyframes heartBeat { 0%,100% {transform:scale(1)} 15% {transform:scale(1.15)} 30% {transform:scale(1)} 45% {transform:scale(1.15)} 60% {transform:scale(1)} }
@keyframes sparkleFloat { 0%,100% {transform:translateY(0) scale(0.8); opacity:0.5} 50% {transform:translateY(-5px) scale(1.2); opacity:1} }
.card-heart:hover .heart-shape { animation: heartBeat 1.2s infinite; transform-origin: center; }
.card-heart:hover .heart-sparkle { animation: sparkleFloat 1.2s infinite; }

/* 4. RECYCLE */
@keyframes recycleSpin { to {transform:rotate(120deg)} }
.card-recycle:hover .recycle-group { animation: recycleSpin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-origin: 22px 22px; }

/* 5. PEOPLE */
@keyframes popUp { 0%,100% {transform:translateY(0)} 50% {transform:translateY(-4px)} }
.card-people:hover .person-1 { animation: popUp 1s ease infinite; }
.card-people:hover .person-2 { animation: popUp 1s ease infinite 0.2s; }
.card-people:hover .person-3 { animation: popUp 1s ease infinite 0.4s; }

/* 6. STAR */
@keyframes starPulse { 0%,100% {transform:scale(1) rotate(0deg)} 50% {transform:scale(1.15) rotate(15deg)} }
@keyframes miniStar { 0%,100% {transform:scale(0) rotate(-15deg); opacity:0} 50% {transform:scale(1) rotate(15deg); opacity:1} }
.card-star:hover .star-main { animation: starPulse 2s ease infinite; transform-origin: 22px 22px; }
.card-star:hover .star-mini1 { animation: miniStar 1.5s ease infinite; transform-origin: 8px 10px; }
.card-star:hover .star-mini2 { animation: miniStar 1.5s ease infinite 0.7s; transform-origin: 36px 30px; }

/* 7. WATER DROP */
@keyframes dropFall { 0% {transform:translateY(-5px) scaleY(1.1); opacity:0} 30% {transform:translateY(0) scaleY(1); opacity:1} 50% {transform:scaleY(0.8) translateY(2px)} 70% {transform:scaleY(1.05) translateY(-1px)} 100% {transform:scaleY(1) translateY(0); opacity:1} }
@keyframes rippleOut { 0% {r:4; opacity:0.8} 100% {r:14; opacity:0} }
.card-drop:hover .drop-shape { animation: dropFall 1.5s ease infinite; transform-origin: bottom; }
.card-drop:hover .drop-ripple { animation: rippleOut 1.5s ease-out infinite; }

/* 8. LOCATION PIN (MAP PIN) */
@keyframes pinJump { 0%,100% {transform:translateY(0) scaleY(1)} 40% {transform:translateY(-8px) scaleY(1.05)} 60% {transform:translateY(2px) scaleY(0.9)} }
@keyframes pinShadow { 0%,100% {transform:scale(1); opacity:0.3} 40% {transform:scale(0.6); opacity:0.1} 60% {transform:scale(1.1); opacity:0.4} }
.card-mappin:hover .pin-body { animation: pinJump 1.2s ease infinite; transform-origin: bottom; }
.card-mappin:hover .pin-shadow { animation: pinShadow 1.2s ease infinite; transform-origin: center; }

/* Old Animations */
@keyframes barGrow { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.4); } }
.card-grow:hover .grow-b1 { animation: barGrow 0.6s ease infinite; transform-origin: bottom; }
.card-grow:hover .grow-b2 { animation: barGrow 0.6s ease infinite 0.1s; transform-origin: bottom; }
.card-grow:hover .grow-b3 { animation: barGrow 0.6s ease infinite 0.2s; transform-origin: bottom; }
@keyframes swing { 0%, 100% { transform: rotate(0); } 50% { transform: rotate(15deg); } }
.card-deals:hover .deals-tag { animation: swing 0.8s ease-in-out infinite; transform-origin: 20px 5px; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
.card-local:hover .local-pin { animation: bounce 0.5s ease infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.card-clock:hover .clock-hand { animation: spin 2s linear infinite; transform-origin: 22px 22px; }
</style>
</head>

  { id: 'holo', label: 'Style 03', title: '⬡ Liquid Crystal · Holographic', class: 'holo-bg', card: 'holo-card', colors: ['#a0c4ff','#7fffff','#d4b3ff','#ffd6a0','#ff9999','#80dfff','#a8ffcc','#ffcc99'] },
  { id: 'aurora', label: 'Style 04', title: '◉ Aurora Gradient Bubble', class: 'aurora-bg', card: 'aurora-card', colors: Array(8).fill('#fff'), colorClass: ['blue','teal','purple','orange','blue','teal','green','orange'] },
  { id: 'clay', label: 'Style 05', title: '⬤ Clay 3D Inflated', class: 'clay-bg', card: 'clay-card', colors: Array(8).fill('#fff'), colorClass: ['blue','teal','purple','orange','blue','teal','green','orange'] }
];

function buildInterface() {
  const container = document.getElementById('main-container');
  
  STYLES.forEach(style => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-label">${style.label}</div><div class="section-title">${style.title}</div>`;
    
    const bg = document.createElement('div');
    bg.className = style.class;
    
    const row = document.createElement('div');
    row.className = 'icon-row';
    
    ICONS.forEach((icon, idx) => {
      const color = style.colors[idx % style.colors.length];
      const cClass = style.colorClass ? style.colorClass[idx % style.colorClass.length] : '';
      
      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      
      const card = document.createElement('div');
      card.className = `${style.card} ${cClass} ${icon.cardClass}`;
      
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'ico');
      svg.setAttribute('viewBox', '0 0 44 44');
      svg.style.color = color;
      
      // Apply drop-shadow filters dynamically for Glass & Holo styles
      if(style.id === 'glass') svg.style.filter = `drop-shadow(0 0 8px ${color}99)`;
      if(style.id === 'holo') svg.style.filter = `drop-shadow(0 0 10px ${color})`;
      
      svg.innerHTML = icon.svgInner;
      
      card.appendChild(svg);
      wrap.appendChild(card);
      wrap.appendChild(Object.assign(document.createElement('span'), {textContent: icon.name}));
      
      // Download Interface
      const dlWrap = document.createElement('div');
      dlWrap.className = 'dl-wrap';
      const btn = document.createElement('button');
      btn.className = 'dl-btn';
      btn.textContent = '↓ Download';
      
      const panel = document.createElement('div');
      panel.className = 'dl-panel';
      panel.innerHTML = `
        <div class="dl-row"><label>Format</label><select class="fmt"><option value="SVG">SVG (Anim)</option><option value="PNG">PNG (Static)</option></select></div>
        <div class="dl-row"><label>Size</label><select class="sz"><option value="64">64px</option><option value="128">128px</option><option value="256" selected>256px</option><option value="512">512px</option></select></div>
        <button class="dl-action">Save Icon</button>`;
      
      btn.onclick = (e) => { 
        e.stopPropagation(); 
        document.querySelectorAll('.dl-panel').forEach(p => p !== panel && p.classList.remove('show'));
        panel.classList.toggle('show'); 
      };
      
      panel.onclick = (e) => e.stopPropagation();
      
      panel.querySelector('.dl-action').onclick = () => {
        const fmt = panel.querySelector('.fmt').value;
        const size = panel.querySelector('.sz').value;
        const filename = icon.name.toLowerCase().replace(/\\s+/g, '-');
        
        btn.textContent = '✓ Saved!';
        btn.classList.add('done');
        setTimeout(() => { btn.textContent = '↓ Download'; btn.classList.remove('done'); }, 1800);
        
        if(fmt === 'SVG') {
          let smilStr = icon.smil(color).replace('<svg ', `<svg width="${size}" height="${size}" `);
          const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\\n' + smilStr], {type: 'image/svg+xml'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = `${filename}-${size}x${size}.svg`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } else {
          const canvas = document.createElement('canvas');
          canvas.width = size; canvas.height = size;
          const img = new Image();
          const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="${size}" height="${size}">${icon.svgInner.replace(/currentColor/g, color)}</svg>`;
          const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
          const url = URL.createObjectURL(blob);
          img.onload = () => { 
            canvas.getContext('2d').drawImage(img, 0,0,size,size); 
            URL.revokeObjectURL(url);
            canvas.toBlob(blob => {
              const url2 = URL.createObjectURL(blob);
              const a = document.createElement('a'); a.href = url2; a.download = `${filename}-${size}x${size}.png`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            }, 'image/png');
          };
          img.src = url;
        }
        panel.classList.remove('show');
      };
      
      dlWrap.appendChild(btn); dlWrap.appendChild(panel);
      wrap.appendChild(dlWrap);
      row.appendChild(wrap);
    });
    
    bg.appendChild(row);
    sec.appendChild(bg);
    container.appendChild(sec);
  });
}

window.onload = buildInterface;
document.onclick = () => document.querySelectorAll('.dl-panel').forEach(p => p.classList.remove('show'));
</script>
